version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sr-health-backend
    container_name: sr-health-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
      DB_HOST: db
      DB_CONNECTION: mysql
      DB_PORT: 3306
      DB_DATABASE: srheak8s_srhealth
      DB_USERNAME: srheak8s_srhealth
      DB_PASSWORD: Srhealth@123
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      - db
    networks:
      - sr-health-network

  db:
    image: mysql:8.0
    container_name: sr-health-db
    restart: unless-stopped
    tty: true
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: srheak8s_srhealth
      MYSQL_USER: srheak8s_srhealth
      MYSQL_PASSWORD: Srhealth@123
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - sr-health-dbdata:/var/lib/mysql
    networks:
      - sr-health-network

networks:
  sr-health-network:
    driver: bridge

volumes:
  sr-health-dbdata:
    driver: local
